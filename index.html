<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TinyStories - Offline Browser AI</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 1rem; }
        textarea { width: 100%; padding: 0.5rem; font-size: 1rem; }
        button { padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer; }
        #output { margin-top: 1rem; padding: 1rem; background: #f5f5f5; border-radius: 8px; white-space: pre-wrap; }
        .status { color: #666; margin: 1rem 0; }
    </style>
</head>
<body>
    <h1>📖 TinyStories - 100% Offline</h1>
    <p>This runs completely in your browser. No data leaves your computer.</p>
    
    <textarea id="prompt" rows="4" placeholder="Enter a story prompt...">Once upon a time, there was a little cat</textarea>
    <br>
    <button id="generate">✨ Generate Story</button>
    <div id="status" class="status">Loading model...</div>
    <div id="output"></div>

    <script src="transformers.min.js"></script>
    <script>
        // === CRITICAL: Configure for FULL OFFLINE MODE ===
        const { env, pipeline } = transformers;
        
        // Disable all remote fetching - only use local files
        env.allowRemoteModels = false;
        env.allowLocalModels = true;
        
        // Point to local model folder (relative to this HTML file)
        env.localModelPath = './models/';
        
        // Optional: Use browser cache for even faster reloads
        env.useBrowserCache = true;
        
        console.log('Transformers.js configured for offline mode');
        console.log('Local model path:', env.localModelPath);
        // ==============================================

        let generator = null;
        const statusDiv = document.getElementById('status');
        const outputDiv = document.getElementById('output');
        const generateBtn = document.getElementById('generate');
        const promptInput = document.getElementById('prompt');

        async function loadModel() {
            try {
                statusDiv.textContent = '📥 Loading model from local folder... (one-time only)';
                statusDiv.style.color = 'blue';
                
                // Load the pipeline with explicit model ID
                generator = await pipeline('text-generation', 'mkly/TinyStories-1M-ONNX');
                
                statusDiv.textContent = '✅ Model ready! You can now generate stories.';
                statusDiv.style.color = 'green';
                generateBtn.disabled = false;
            } catch (err) {
                statusDiv.textContent = `❌ Error loading model: ${err.message}. Check that model files exist in ./models/mkly/TinyStories-1M-ONNX/`;
                statusDiv.style.color = 'red';
                console.error('Load error:', err);
            }
        }

        async function generateStory() {
            if (!generator) {
                statusDiv.textContent = '⚠️ Model still loading, please wait...';
                return;
            }
            
            const prompt = promptInput.value.trim();
            if (!prompt) {
                outputDiv.textContent = 'Please enter a story prompt.';
                return;
            }
            
            outputDiv.textContent = '📝 Generating...';
            generateBtn.disabled = true;
            
            try {
                const result = await generator(prompt, {
                    max_new_tokens: 150,
                    temperature: 0.8,
                    do_sample: true
                });
                
                outputDiv.textContent = result[0].generated_text;
            } catch (err) {
                outputDiv.textContent = `Error: ${err.message}`;
                console.error('Generation error:', err);
            } finally {
                generateBtn.disabled = false;
            }
        }

        generateBtn.onclick = generateStory;
        generateBtn.disabled = true;
        
        // Start loading
        loadModel();
    </script>
</body>
  </html>
